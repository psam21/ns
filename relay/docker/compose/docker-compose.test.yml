# Testing Database Only - PostgreSQL
# Simple standalone database for testing with different ports

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-test
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: shugur
    volumes:
      - postgres_test_volume:/var/lib/postgresql/data
    ports:
      - "5433:5432" # PostgreSQL (different port to avoid conflicts)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay -d shugur"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - test_network

volumes:
  postgres_test_volume:
    driver: local
    
networks:
  test_network:
    driver: bridge