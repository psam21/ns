# Development Database Only - PostgreSQL
# Simple standalone database for development with different ports

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-dev
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: shugur
    volumes:
      - postgres_dev_volume:/var/lib/postgresql/data
    ports:
      - "5433:5432" # PostgreSQL (different port for dev)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay -d shugur"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dev_network

volumes:
  postgres_dev_volume:
    driver: local
    
networks:
  dev_network:
    driver: bridge