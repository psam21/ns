# Shugur Distributed Relay - Multi-Node Docker Compose
# This is a reference template for a distributed relay setup
# Each node runs a relay instance connecting to a shared Aurora PostgreSQL cluster
# Generated files are created automatically by install.distributed.sh

services:
  # Relay Service Node 1
  relay-node1:
    image: ghcr.io/shugur-network/relay:latest
    container_name: relay-node1
    hostname: relay-node1
    restart: unless-stopped
    environment:
      - SHUGUR_ENV=production
      - SHUGUR_DB_HOST=${DB_HOST}  # Aurora PostgreSQL endpoint
      - SHUGUR_DB_PORT=5432
      - SHUGUR_DB_DATABASE=shugur
      - SHUGUR_DB_USER=relay
      - SHUGUR_DB_PASSWORD=${DB_PASSWORD}
      - SHUGUR_DB_SSL_MODE=require
      - SHUGUR_LOG_LEVEL=info
      - SHUGUR_LOG_FORMAT=json
      - SHUGUR_METRICS_ENABLED=true
      - SHUGUR_WS_PORT=8080
      - SHUGUR_METRICS_PORT=8181
      - SHUGUR_MAX_CONNECTIONS=2000
      - SHUGUR_NODE=node1
    volumes:
      - ./config/config.yaml:/app/config.yaml:ro
      - ./certs:/app/certs:ro
      - ./logs/relay:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    network_mode: host

  # Caddy Reverse Proxy Node 1
  caddy-node1:
    image: caddy:latest
    container_name: caddy-node1
    hostname: caddy-node1
    restart: unless-stopped
    ports:
      - "80:80"      # HTTP
      - "443:443"    # HTTPS
      - "8090:8090"  # Health check
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data_node1:/data
      - caddy_config_node1:/config
      - ./logs/caddy:/var/log/caddy
    depends_on:
      - relay-node1
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - distributed_network

volumes:
  caddy_data_node1:
    driver: local
  caddy_config_node1:
    driver: local

networks:
  distributed_network:
    driver: bridge

# Additional nodes would have similar configurations with:
# - Different node IDs (node2, node3, etc.)
# - Different hostnames and container names
# - Unique volume names
# - Same Aurora PostgreSQL connection (DB_HOST, DB_PASSWORD from .env)
# - Same network configuration
